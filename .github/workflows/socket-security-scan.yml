name: Socket Security Scan

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6 AM UTC
  workflow_dispatch:
    inputs:
      enable_reachability:
        description: 'Enable Tier 1 reachability analysis'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: socket-security-scan
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  socket-security:
    name: Socket Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"

      - name: Install uv (Python package manager)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install Socket CLI
        run: pip install socketsecurity --upgrade

      - name: Run Socket Security Scan
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          PYTHONUNBUFFERED: "1"
          ENABLE_REACHABILITY: ${{ github.event.inputs.enable_reachability }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"

          REACH_FLAGS=""
          if [[ "$ENABLE_REACHABILITY" != "false" ]]; then
            REACH_FLAGS="--reach --reach-memory-limit 16384 --reach-timeout 3600"
            echo "Reachability analysis enabled"
          fi

          echo "Scanning repository: $REPO_NAME"

          socketcli \
            --target-path "$GITHUB_WORKSPACE" \
            --repo "$REPO_NAME" \
            --enable-debug \
            $REACH_FLAGS
